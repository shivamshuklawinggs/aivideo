version: '3.8'

services:
  # Ollama - Primary Local AI Model Server
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    networks:
      - ai-network

  # Cohere Compatible Mock API Server
  cohere-mock:
    image: python:3.9-slim
    container_name: cohere-mock
    ports:
      - "15001:15001"
    volumes:
      - ./scripts/cohere-mock:/app
    working_dir: /app
    command: >
      sh -c "pip install -r requirements.txt > /dev/null 2>&1 && 
             python -m flask run --host=0.0.0.0 --port=15001"
    restart: unless-stopped
    networks:
      - ai-network

  # Embedding Service
  embedding-service:
    image: python:3.9-slim
    container_name: embedding-service
    ports:
      - "15002:15002"
    volumes:
      - ./scripts/embedding-service:/app
    working_dir: /app
    command: >
      sh -c "pip install -r requirements.txt > /dev/null 2>&1 && 
             python -m flask run --host=0.0.0.0 --port=15002"
    restart: unless-stopped
    networks:
      - ai-network

  # Voice Synthesis Service (Mock)
  xtts-service:
    image: python:3.9-slim
    container_name: xtts-service
    ports:
      - "8002:8002"
    volumes:
      - ./scripts/xtts-service:/app
    working_dir: /app
    command: >
      sh -c "pip install -r requirements.txt > /dev/null 2>&1 && 
             python app.py"
    restart: unless-stopped
    networks:
      - ai-network

volumes:
  ollama_data:

networks:
  ai-network:
    driver: bridge
